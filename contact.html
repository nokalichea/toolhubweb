<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact ToolHub for support, feedback, bug reports, partnership questions, and new tool suggestions.">
  <title>Contact Us - ToolHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <article class="page-card">
      <p class="eyebrow">Contact us</p>
      <h1>We welcome support requests, feedback, and tool ideas.</h1>
      <p>Email: <strong>hello@toolhub.example</strong></p>
      <form class="contact-form" action="mailto:hello@toolhub.example" method="post" enctype="text/plain">
        <label>Your name <input type="text" name="name" required></label>
        <label>Your email <input type="text" name="email" required></label>
        <label>Message <textarea name="message" rows="6" required placeholder="Tell us what you need help with or which tool you want next."></textarea></label>
        <button class="button primary" type="submit">Send message</button>
      </form>
      <p><a class="button ghost" href="index.html">Back to tools</a></p>
    </article>
  </main>
</body>
</html>
